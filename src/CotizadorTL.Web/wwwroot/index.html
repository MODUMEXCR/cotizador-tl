<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotizador Thin Laminates</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css?v=55" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CotizadorTL.Web.styles.css?v=55" rel="stylesheet" />
    <script type="importmap"></script>
    <script>window.__APP_VER = "55";</script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error inesperado.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="lib/jspdf/jspdf.umd.min.js"></script>
    <script src="lib/jspdf/jspdf.plugin.autotable.min.js"></script>
    <script src="js/logos.js"></script>
    <script src="js/fns.js"></script>
    <script src="js/pdf.js"></script>
    <script src="lib/exceljs/exceljs.min.js"></script>
    <script src="js/excel.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <!-- Auto-recuperación: si tras un deploy el navegador tiene el index.html viejo en caché, el WASM no arranca
         (se queda el spinner o sale el error). Recarga UNA vez saltándose la caché; con guarda para no ciclar. -->
    <script>
      (function () {
        var KEY = "tl_reintento_arranque";

        // Chequeo de versión: si el index.html en caché es viejo, version.txt (sin caché) no coincide
        // con la versión embebida -> recarga saltándose la caché (con guarda por versión, sin ciclos).
        try {
          fetch("version.txt?_=" + Date.now(), { cache: "no-store" })
            .then(function (r) { return r.ok ? r.text() : null; })
            .then(function (remoto) {
              if (!remoto) return;
              remoto = remoto.trim();
              var local = window.__APP_VER || "";
              if (remoto && local && remoto !== local) {
                if (sessionStorage.getItem("tl_ver_reload") !== remoto) {
                  sessionStorage.setItem("tl_ver_reload", remoto);
                  var u = location.href.split("#")[0];
                  u += (u.indexOf("?") >= 0 ? "&" : "?") + "cb=" + Date.now();
                  location.replace(u);
                }
              } else {
                sessionStorage.removeItem("tl_ver_reload");
              }
            })
            .catch(function () { });
        } catch (e) { }

        setTimeout(function () {
          var spinner = document.querySelector("#app .loading-progress");
          var eu = document.getElementById("blazor-error-ui");
          var errorVisible = eu && getComputedStyle(eu).display !== "none";
          var noArranco = !!spinner || errorVisible;
          if (noArranco && !sessionStorage.getItem(KEY)) {
            sessionStorage.setItem(KEY, "1");
            var u = location.href.split("#")[0];
            u += (u.indexOf("?") >= 0 ? "&" : "?") + "cb=" + Date.now();
            location.replace(u);   // fuerza re-descarga del index.html (nueva clave de caché)
          } else if (!noArranco) {
            sessionStorage.removeItem(KEY);                 // arrancó bien: limpia la guarda
            if (location.href.indexOf("cb=") >= 0) {         // y quita el ?cb= de la barra
              try { history.replaceState(null, "", location.href.replace(/[?&]cb=\d+/, "").replace(/[?&]$/, "")); } catch (e) { }
            }
          }
        }, 15000);
      })();
    </script>
</body>

</html>
